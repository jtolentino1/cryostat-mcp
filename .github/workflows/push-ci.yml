name: Push CI

concurrency:
  group: push-ci-${{ github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - v[0-9]+
      - v[0-9]+.[0-9]+
      - cryostat-v[0-9]+.[0-9]+

env:
  CI_USER: cryostat+bot
  CI_REGISTRY: quay.io/cryostat
  CI_IMG: quay.io/cryostat/cryostat-mcp-k8s-mux

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'cryostatio' }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        submodules: true
        fetch-depth: 0

    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '25'
        distribution: 'temurin'

    - uses: skjolber/maven-cache-github-action@c4a30022e05fa8a86dde82cd8c1e49420d4a45dd # v3.1.2
      with:
        step: restore

    - name: Build with Maven
      run: ./mvnw -B -U clean package -pl cryostat-mcp-k8s-mux -am

    - uses: skjolber/maven-cache-github-action@c4a30022e05fa8a86dde82cd8c1e49420d4a45dd # v3.1.2
      with:
        step: save

    - name: Get project version
      id: get-version
      run: |
        echo "version=$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version -pl cryostat-mcp-k8s-mux | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Get date tag
      run: echo "DATE_TAG=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

    - name: Build container images and manifest
      id: buildah-build
      uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
      with:
        image: ${{ env.CI_IMG }}
        archs: amd64, arm64
        tags: ${{ steps.get-version.outputs.version }} ${{ env.DATE_TAG }} latest
        context: cryostat-mcp-k8s-mux
        containerfiles: |
          cryostat-mcp-k8s-mux/src/main/docker/Dockerfile.jvm

    - name: Push to quay.io
      id: push-to-quay
      uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
      with:
        image: cryostat-mcp-k8s-mux
        tags: ${{ steps.buildah-build.outputs.tags }}
        registry: ${{ env.CI_REGISTRY }}
        username: ${{ env.CI_USER }}
        password: ${{ secrets.REPOSITORY_TOKEN }}