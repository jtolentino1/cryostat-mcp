quarkus.application.name=cryostat-mcp-k8s-mux

# Console Logging Configuration
quarkus.log.console.enabled=true
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.http.port=8080

# CORS configuration for SSE MCP endpoints
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type

quarkus.kubernetes-client.trust-certs=true

# Named TLS configuration for disabling certificate verification (dev/test only)
# Set via environment variables
quarkus.tls.notls.trust-all=${QUARKUS_TLS_NOTLS_TRUST_ALL:false}
quarkus.tls.notls.hostname-verification-algorithm=${QUARKUS_TLS_NOTLS_HOSTNAME_VERIFICATION_ALGORITHM:HTTPS}

# GraphQL client TLS configuration - references the named TLS configuration
quarkus.smallrye-graphql-client.notls.tls-configuration-name=notls

# Container Image Configuration
quarkus.container-image.build=true
quarkus.container-image.push=false
quarkus.container-image.registry=quay.io
quarkus.container-image.group=cryostat
quarkus.container-image.name=cryostat-mcp-k8s-mux
quarkus.container-image.tag=latest

# Authorization header for Cryostat instances
# Set via environment variable: K8S_MUX_AUTHORIZATION_HEADER
k8s.mux.authorization.header=${K8S_MUX_AUTHORIZATION_HEADER:}

# Cryostat GraphQL endpoint path
cryostat.graphql.path=/api/v4/graphql

# Pod name resolution cache configuration
quarkus.cache.caffeine."pod-name-resolution".initial-capacity=100
quarkus.cache.caffeine."pod-name-resolution".maximum-size=1000
quarkus.cache.caffeine."pod-name-resolution".expire-after-write=10m

# Pod target mapping cache configuration (namespace, podName -> TargetInfo)
quarkus.cache.caffeine."pod-target-mapping".initial-capacity=128
quarkus.cache.caffeine."pod-target-mapping".maximum-size=1024
quarkus.cache.caffeine."pod-target-mapping".expire-after-access=5m

# REST Client Configuration
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=1024

# Jackson Configuration - skip null fields in JSON serialization
quarkus.jackson.serialization-inclusion=non-null

# SmallRye Health Configuration
quarkus.smallrye-health.root-path=/q/health
quarkus.smallrye-health.liveness-path=/q/health/live
quarkus.smallrye-health.readiness-path=/q/health/ready
quarkus.smallrye-health.startup-path=/q/health/started